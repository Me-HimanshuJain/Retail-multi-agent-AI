version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:15
    container_name: retail_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-retail_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail} -d ${POSTGRES_DB:-retail_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: retail_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: retail_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # --- PLATFORM (Your Code) ---
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: retail_api
    env_file: .env          # SECRET_KEY, DATABASE_URL, BOOTSTRAP_USERS_JSON — all from .env
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-retail}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-retail_db}
      - REDIS_URL=redis://redis:6379/0
      - MODEL_DIR=models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: retail_ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data: